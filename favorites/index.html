<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DQ10 お気に入り | dq10toolweb</title>
  <meta name="description" content="dq10toolwebのお気に入りページを開きます。">
  <link rel="canonical" href="./">
  <meta http-equiv="refresh" content="0; url=../?tab=favorites">
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: sans-serif; background: #f7efe3; color: #4b3624; }
    a { color: #7b4a22; font-weight: 700; }
  </style>
  <script>
    (function () {
      var target = new URL("../", window.location.href);
      var params = new URLSearchParams(window.location.search);
      params.set("tab", "favorites");
      target.search = params.toString();
      target.hash = window.location.hash;
      window.location.replace(target.toString());
    }());
  </script>
</head>
<body>
  <main>
    <p>お気に入りを開いています。</p>
    <p><a href="../?tab=favorites">開かない場合はこちら</a></p>
  </main>
</body>
</html>
